name: Deploy Development

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to deploy
        required: true
        default: main
  issue_comment:
    types: [created]

permissions:
  pull-requests: write
  deployments: write
  contents: write
  checks: read
  statuses: read
  packages: write

concurrency:
  group: deploy-dev

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.issue.pull_request }}
    runs-on: ubuntu-latest
    environment: development
    steps:
      - name: Branch deploy trigger
        id: branch-deploy
        if: ${{ github.event_name == 'issue_comment' }}
        uses: github/branch-deploy@v11.0.0
        with:
          trigger: ".deploy"
          environment: development
      - uses: actions/checkout@v4
        if: ${{ github.event_name == 'workflow_dispatch' || steps.branch-deploy.outputs.continue == 'true' }}
        with:
          ref: ${{ steps.branch-deploy.outputs.sha || inputs.ref }}
      - name: Resolve deploy SHA
        id: sha
        if: ${{ github.event_name == 'workflow_dispatch' || steps.branch-deploy.outputs.continue == 'true' }}
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@v3
        if: ${{ github.event_name == 'workflow_dispatch' || steps.branch-deploy.outputs.continue == 'true' }}
      - uses: docker/login-action@v3
        if: ${{ github.event_name == 'workflow_dispatch' || steps.branch-deploy.outputs.continue == 'true' }}
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        if: ${{ github.event_name == 'workflow_dispatch' || steps.branch-deploy.outputs.continue == 'true' }}
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:${{ steps.sha.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Set up SSH key
        if: ${{ github.event_name == 'workflow_dispatch' || steps.branch-deploy.outputs.continue == 'true' }}
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_HOST_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
      - name: Pin remote host key
        if: ${{ github.event_name == 'workflow_dispatch' || steps.branch-deploy.outputs.continue == 'true' }}
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_HOST_KEY }}" >> ~/.ssh/known_hosts
      - name: Set up Docker context
        if: ${{ github.event_name == 'workflow_dispatch' || steps.branch-deploy.outputs.continue == 'true' }}
        run: |
          docker context create dev-server \
            --docker "host=ssh://${{ secrets.SERVER_HOST_USER }}@${{ secrets.SERVER_HOST_IP }}"
          docker context use dev-server
      - name: Deploy
        if: ${{ github.event_name == 'workflow_dispatch' || steps.branch-deploy.outputs.continue == 'true' }}
        run: |
          docker compose -f docker-compose.dev.yml pull
          docker compose -f docker-compose.dev.yml up -d
        env:
          IMAGE_TAG: ${{ steps.sha.outputs.sha }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
